<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduMentor AI</title>
  <link rel="idea" href="data:,">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <h1>EduMentor AI</h1>
      <p>
        Generate simple explanations, quizzes, viva questions, summaries, and study plans using a live AI model.
      </p>
    </section>

    <section class="app-card">
      <form id="mentorForm">
        <div class="field-group">
          <label for="topic">Enter your topic</label>
          <textarea
            id="topic"
            name="topic"
            rows="4"
            placeholder="Example: DBMS Normalization, Python OOP, Cloud Computing, OS Scheduling..."
            required
          ></textarea>
        </div>

        <div class="grid">
          <div class="field-group">
            <label for="mode">Choose mode</label>
            <select id="mode" name="mode">
              <option>Explain Simply</option>
              <option>Generate Quiz</option>
              <option>Create Study Plan</option>
              <option>Summarize Topic</option>
              <option>Viva Questions</option>
            </select>
          </div>

          <div class="field-group">
            <label for="level">Student level</label>
            <select id="level" name="level">
              <option value="school">School</option>
              <option value="college" selected>College</option>
              <option value="beginner">Beginner</option>
              <option value="interview">Interview Prep</option>
            </select>
          </div>

          <div class="field-group">
            <label for="length">Answer length</label>
            <select id="length" name="length">
              <option value="short">Short</option>
              <option value="medium" selected>Medium</option>
              <option value="detailed">Detailed</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="generateBtn">Generate Answer</button>
          <button type="button" id="stopBtn" class="secondary" disabled>Stop</button>
          <button type="button" id="clearBtn" class="ghost">Clear</button>
        </div>
      </form>
    </section>

    <section class="output-card">
      <div class="output-header">
        <div>
          <h2>AI Response</h2>
          <p id="status">Ready when you are.</p>
        </div>
        <button type="button" id="copyBtn" class="copy-btn">Copy</button>
      </div>

      <pre id="output">Your generated learning content will appear here...</pre>
    </section>
  </main>

  <footer class="footer">
    <p>Designed by <span>Alok Maurya,Divyansh Shukla<br> 
                 & Adit Kumar Verma</span></p>
  </footer>

  <script src="/static/script.js"></script>

</body>
</html>
